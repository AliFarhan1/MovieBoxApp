name: Build Unsigned IPA for SideStore

on:
  push:
    branches:
      - main

jobs:
  build:
    name: Build IPA
    runs-on: macos-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode Project
        run: xcodegen generate

      - name: Build App (Unsigned)
        run: |
          xcodebuild -project MovieBoxApp.xcodeproj \
          -scheme MovieBoxApp \
          -configuration Release \
          -sdk iphoneos \
          -derivedDataPath build \
          CODE_SIGNING_ALLOWED=NO

      - name: Package into IPA
        run: |
          mkdir -p Payload
          cp -r build/Build/Products/Release-iphoneos/MovieBoxApp.app Payload/
          zip -r MovieBox.ipa Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: MovieBox.ipa
          path: MovieBox.ipa
